<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Join us to celebrate the wedding of Daniela and Jedediah" />
    <meta name="theme-color" content="#1B2B4B" />
    <title>Daniela &amp; Jedediah | Wedding</title>

    <!-- Google Fonts: Cormorant Garamond (headings) + Lato (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      #loading-screen {
        position: fixed; inset: 0; background: #FAF7F2;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease;
      }
      #loading-screen.out { opacity: 0; pointer-events: none; }
      .ls-mono { font-family: Georgia, serif; font-size: 2.2rem; color: #1B2B4B; letter-spacing: 0.18em; font-weight: 300; }
      .ls-line  { width: 44px; height: 1px; background: #C9A96E; margin: 14px auto; }
      .ls-dot   { width: 7px; height: 7px; background: #C9A96E; border-radius: 50%; animation: lspulse 1.2s ease-in-out infinite; }
      @keyframes lspulse { 0%,100%{opacity:.25;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <p class="ls-mono">D &amp; J</p>
      <div class="ls-line"></div>
      <div class="ls-dot"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
